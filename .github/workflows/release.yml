name: release

# Build, Developer ID sign, notarize, and publish a yabai-plus release.
#
# Triggers when you push a tag like `v7.1.25-plus.1`. The job runs on a macOS
# runner, imports your Apple "Developer ID Application" certificate into a
# throwaway keychain, builds a universal (x86_64 + arm64) binary, signs it with
# the hardened runtime, notarizes it with notarytool, then creates a GitHub
# Release with the `yabai-v<version>.tar.gz` archive attached.
#
# Required repository secrets (Settings -> Secrets and variables -> Actions):
#   BUILD_CERTIFICATE_BASE64  base64 of your exported "Developer ID Application" .p12
#                             (export from Keychain Access; `base64 -i cert.p12 | pbcopy`)
#   P12_PASSWORD              password you set when exporting the .p12
#   KEYCHAIN_PASSWORD         any random string; used for the temp CI keychain
#   SIGNING_IDENTITY          full identity name, e.g.
#                             "Developer ID Application: Eric Wang (TEAMID)"
#   AC_API_KEY_ID             App Store Connect API key id   (e.g. ABC123DEF4)
#   AC_API_ISSUER_ID          App Store Connect issuer id    (a UUID)
#   AC_API_KEY_BASE64         base64 of your AuthKey_XXXX.p8  (App Store Connect key)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write   # needed to create the GitHub Release

jobs:
  release:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Import Developer ID certificate
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          CERT_PATH="$RUNNER_TEMP/cert.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"

          echo "$BUILD_CERTIFICATE_BASE64" | base64 --decode > "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security import "$CERT_PATH" -P "$P12_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH" >/dev/null
          security list-keychain -d user -s "$KEYCHAIN_PATH" login.keychain-db

      - name: Build (universal)
        run: make install

      - name: Build man page
        run: |
          set -euo pipefail
          brew install asciidoctor >/dev/null
          make man

      - name: Codesign (hardened runtime)
        env:
          SIGNING_IDENTITY: ${{ secrets.SIGNING_IDENTITY }}
        run: |
          set -euo pipefail
          codesign --force --timestamp --options runtime \
            --sign "$SIGNING_IDENTITY" bin/yabai
          codesign --verify --strict --verbose=2 bin/yabai

      - name: Notarize
        env:
          AC_API_KEY_ID: ${{ secrets.AC_API_KEY_ID }}
          AC_API_ISSUER_ID: ${{ secrets.AC_API_ISSUER_ID }}
          AC_API_KEY_BASE64: ${{ secrets.AC_API_KEY_BASE64 }}
        run: |
          set -euo pipefail
          KEY_PATH="$RUNNER_TEMP/AuthKey.p8"
          echo "$AC_API_KEY_BASE64" | base64 --decode > "$KEY_PATH"

          # notarytool needs a zip/pkg/dmg; a bare Mach-O can't be submitted directly.
          ditto -c -k --keepParent bin/yabai "$RUNNER_TEMP/yabai-notarize.zip"

          xcrun notarytool submit "$RUNNER_TEMP/yabai-notarize.zip" \
            --key "$KEY_PATH" \
            --key-id "$AC_API_KEY_ID" \
            --issuer "$AC_API_ISSUER_ID" \
            --wait
          # NOTE: a standalone CLI binary can't be stapled; Gatekeeper verifies the
          # notarization ticket online on first run, which is sufficient.

      - name: Assemble archive
        id: archive
        run: |
          set -euo pipefail
          VERSION="$(bin/yabai --version)"   # e.g. yabai-v7.1.25-plus.1
          rm -rf archive && mkdir -p archive
          cp -r bin archive/
          cp -r doc archive/
          cp -r examples archive/
          tar -cvzf "bin/${VERSION}.tar.gz" archive
          rm -rf archive
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tarball=bin/${VERSION}.tar.gz" >> "$GITHUB_OUTPUT"
          shasum -a 256 "bin/${VERSION}.tar.gz"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release create "${{ github.ref_name }}" \
            "${{ steps.archive.outputs.tarball }}" \
            --title "${{ steps.archive.outputs.version }}" \
            --generate-notes
